<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>六六齐 · 十连胜</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app" class="app" data-screen-mode="1" data-battle-mode="same">
    <header class="top-bar">
      <h1 class="title">六六齐 · 十连胜</h1>
      <div class="mode-picks">
        <label>同屏
          <select id="battleMode">
            <option value="same">同屏对战</option>
            <option value="dual">双机对战（暂未实现）</option>
          </select>
        </label>
        <label class="same-only">同屏布局
          <select id="screenMode">
            <option value="1">双方并排坐</option>
            <option value="2">双方面对面坐</option>
          </select>
        </label>
        <label>时间
          <select id="timePreset">
            <option value="120">120 秒 + 10 秒/步</option>
            <option value="custom">自定义</option>
            <option value="unlimited">无限制</option>
          </select>
        </label>
        <span id="customTimeRow" class="custom-time hidden">
          <input type="number" id="baseSec" min="30" max="3600" value="120" /> 秒 +
          <input type="number" id="incSec" min="0" max="120" value="10" /> 秒/步
        </span>
        <button type="button" id="btnNewGame" class="btn">新对局</button>
      <!-- 新增玩法说明链接 -->
 <a href="https://mp.weixin.qq.com/mp/appmsgalbum?action=getalbum&__biz=MjM5NzY0Nzg5Mg==&scene=1&album_id=4366616666248052758&count=3#wechat_redirect" 
 target="_blank" 
 style="color: #9aa0a6; font-size: 0.875rem; text-decoration: none; margin-left: 10px;"
 title="六六齐玩法说明">六六齐玩法说明</a>
 <!--ref="./rule/index.html" style="display:inline-block; padding:12px 20px; background:#c7000b; color:#fff; border-radius:10px; text-decoration:none; margin:10px 0; font-size:16px;">
  📖 六六齐玩法说明
  </a>-->
 </div>
</header>

<!-- 微信遮罩层开始 -->
<div id="wechat-tip" class="wechat-tip">
  <div class="wechat-tip-content">
    <!-- 这里的箭头符号可以直接用，也可以替换成图片 -->
    <div class="wechat-arrow">↗️</div>
    <h2>请使用浏览器打开</h2>
    <p>啦啦好温馨提示<br>为了获得最佳体验，请勿在微信内直接访问</p>
    <p>请点击右上角 <strong>...</strong> 选择 <strong>在浏览器打开</strong></p>
  <!-- 新增底部图片和文字 -->
  <div class="wechat-bottom-info">
    <img src="./lalahao.jpg" alt="六六齐十一种玩法说明及购买链接" 
         style="width: 150px; height: 150px; margin: 20px auto; display: block; border-radius: 8px;">
    <p style="font-size: 14px; color: #ccc; text-align: center; margin-top: 10px;">
      六六齐十一种玩法说明及购买链接<br>按住图片即可进入公众号查看
    </p>
  </div>
  </div>
</div>
<!-- 微信遮罩层结束 -->
<!-- 新增：横屏提示遮罩层 -->
<div id="landscape-tip" class="landscape-tip">
  <div class="landscape-content">
    <div class="rotate-icon">📱</div>
    <h2>请旋转手机</h2>
    <p>啦啦好温馨提示<br>为了获得最佳体验，请使用横屏模式</p>
    <div class="wechat-bottom-info">
      <img src="./lalahao.jpg" alt="六六齐十一种玩法说明及购买链接" 
           style="width: 150px; height: 150px; margin: 20px auto; display: block; border-radius: 8px;">
      <p style="font-size: 14px; color: #ccc; text-align: center; margin-top: 10px;">
        六六齐十一种玩法说明及购买链接<br>保存图片微信扫一扫即可查看
      </p>
    </div>
  </div>
</div>
<!-- 你的游戏主代码 (保持原有的结构不变) -->
    <div class="game-wrap">
      <aside class="panel panel--blue" id="panelBlue" data-player="blue">
        <div class="panel-head">
          <span class="player-name">蓝方</span>
          <span class="clock" id="clockBlue">120</span>
        </div>
        <div class="queue" id="queueBlue" aria-label="蓝方出棋列"></div>
      </aside>

      <main class="board-wrap">
        <div id="firstPlayerBanner" class="banner hidden" role="status"></div>
        <div id="board" class="board" aria-label="13 乘 13 棋盘"></div>
        <p class="hint" id="statusText">准备开始：点击「新对局」</p>
      </main>

      <aside class="panel panel--red" id="panelRed" data-player="red">
        <div class="panel-head">
          <span class="player-name">红方</span>
          <span class="clock" id="clockRed">120</span>
        </div>
        <div class="queue" id="queueRed" aria-label="红方出棋列"></div>
      </aside>
    </div>

    <footer class="bottom-bar">
玩家获胜时需要主动点击      <button type="button" id="btnClaimWin" class="btn btn--gold" disabled>我赢了</button>
    </footer>
  </div>

  <div id="modalOverlay" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true">
      <p id="modalMessage"></p>
      <button type="button" id="modalClose" class="btn">确定</button>
    </div>
  </div>

  <script defer src="js/game.js"></script>
</body>
</html>
